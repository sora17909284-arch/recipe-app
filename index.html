<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AIレシピアプリ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:85%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px 20px;
font-size:15px;
border:none;
border-radius:12px;
background:#ff914d;
color:white;
width:90%;
}

.food-buttons button{
background:#eee;
color:black;
width:auto;
margin:5px;
}

.card{
margin-top:20px;
background:#fafafa;
padding:20px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:left;
white-space:pre-line;
}

.ad{
margin-top:20px;
padding:15px;
background:#eee;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="box">

<h2>🍳 冷蔵庫レシピ</h2>

<p>材料を入力（複数OK）</p>

<input id="food" placeholder="例：卵、キャベツ、鶏肉">

<div class="food-buttons">

<button onclick="setFood('卵')">🥚</button>
<button onclick="setFood('鶏肉')">🍗</button>
<button onclick="setFood('キャベツ')">🥬</button>
<button onclick="setFood('豚肉')">🐷</button>

</div>

<br>

<p>📸 食材写真</p>

<input type="file" accept="image/*" onchange="showImage(event)">

<img id="preview" style="width:100%;margin-top:10px;border-radius:10px">

<button onclick="recipe()">レシピ生成</button>

<button onclick="openAI()">AIレシピ（無料）</button>

<button onclick="saveRecipe()">お気に入り保存</button>

<button onclick="loadRecipe()">お気に入り表示</button>

<button onclick="showHistory()">履歴</button>

<div id="result" class="card"></div>

<div class="ad">

広告スペース  
（ここに AdSense を入れる）

</div>

</div>

<script>

function setFood(food){

let current=document.getElementById("food").value

if(current===""){
document.getElementById("food").value=food
}else{
document.getElementById("food").value=current+","+food
}

}

function recipe(){

const food=document.getElementById("food").value

const recipes=[

`🍳 ${food}炒め

材料
${food}

作り方
1 食材を切る
2 フライパンで炒める
3 塩コショウ`,

`🍚 ${food}チャーハン

材料
${food}
ご飯

作り方
1 食材炒める
2 ご飯入れる
3 醤油`,

`🥗 ${food}サラダ

材料
${food}

作り方
1 カット
2 混ぜる
3 ドレッシング`

]

const r=recipes[Math.floor(Math.random()*recipes.length)]

document.getElementById("result").innerText=r

saveHistory(r)

}

function showImage(event){

const file=event.target.files[0]

const reader=new FileReader()

reader.onload=function(e){

document.getElementById("preview").src=e.target.result

}

reader.readAsDataURL(file)

}

function saveRecipe(){

const recipe=document.getElementById("result").innerText

localStorage.setItem("savedRecipe",recipe)

alert("保存しました")

}

function loadRecipe(){

const saved=localStorage.getItem("savedRecipe")

if(saved){

document.getElementById("result").innerText=saved

}

}

function saveHistory(recipe){

let history=JSON.parse(localStorage.getItem("recipeHistory"))||[]

history.unshift(recipe)

localStorage.setItem("recipeHistory",JSON.stringify(history))

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("recipeHistory"))||[]

document.getElementById("result").innerText=history.join("\n\n------\n\n")

}

function openAI(){

const food=document.getElementById("food").value

const prompt=encodeURIComponent(food+" を使った簡単レシピを教えて")

const url="https://chat.openai.com/?q="+prompt

window.open(url,"_blank")

}

</script>

</body>
</html>
