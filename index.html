<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AIレシピアプリ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f6f6f6;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}

input{
width:85%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px 20px;
font-size:15px;
border:none;
border-radius:12px;
background:#ff914d;
color:white;
width:90%;
}

button:hover{
opacity:0.9;
}

#result{
margin-top:20px;
text-align:left;
white-space:pre-line;
background:#fafafa;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>🍳 AIレシピアプリ</h2>

<p>食材を入力</p>

<input id="food" placeholder="例：卵、キャベツ">

<br>

<button onclick="recipe()">レシピ生成</button>

<button onclick="openAI()">AIレシピ（無料）</button>

<button onclick="saveRecipe()">お気に入り保存</button>

<button onclick="loadRecipe()">お気に入り表示</button>

<button onclick="showHistory()">履歴を見る</button>

<div id="result"></div>

</div>

<script>

function recipe(){

const food = document.getElementById("food").value

const recipes = [

`簡単炒め

材料
${food}

作り方
1 食材を切る
2 フライパンで炒める
3 塩コショウ
完成`,

`チャーハン

材料
${food}
ご飯

作り方
1 食材炒める
2 ご飯入れる
3 醤油
完成`,

`サラダ

材料
${food}

作り方
1 カット
2 混ぜる
3 ドレッシング
完成`

]

const r = recipes[Math.floor(Math.random()*recipes.length)]

document.getElementById("result").innerText = r

saveHistory(r)

}

function saveRecipe(){

const recipe = document.getElementById("result").innerText

localStorage.setItem("savedRecipe",recipe)

alert("お気に入りに保存しました")

}

function loadRecipe(){

const saved = localStorage.getItem("savedRecipe")

if(saved){

document.getElementById("result").innerText = saved

}

}

function saveHistory(recipe){

let history = JSON.parse(localStorage.getItem("recipeHistory")) || []

history.unshift(recipe)

localStorage.setItem("recipeHistory", JSON.stringify(history))

}

function showHistory(){

let history = JSON.parse(localStorage.getItem("recipeHistory")) || []

document.getElementById("result").innerText = history.join("\n\n------\n\n")

}

function openAI(){

const food = document.getElementById("food").value

const prompt = encodeURIComponent(food + " を使った簡単な料理レシピを教えて")

const url = "https://chat.openai.com/?q=" + prompt

window.open(url,"_blank")

}

</script>

</body>
</html>
