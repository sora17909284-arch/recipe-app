<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI冷蔵庫レシピ</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family:-apple-system;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:85%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:#ff914d;
color:white;
width:90%;
font-size:15px;
}

.food-buttons button{
background:#eee;
color:black;
width:auto;
margin:5px;
}

.card{
margin-top:20px;
background:#fafafa;
padding:20px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:left;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="box">

<h2>🍳 AI冷蔵庫レシピ</h2>

<p>材料（複数OK）</p>

<input id="food" placeholder="卵、鶏肉、キャベツ">

<div class="food-buttons">
<button onclick="setFood('卵')">🥚</button>
<button onclick="setFood('鶏肉')">🍗</button>
<button onclick="setFood('キャベツ')">🥬</button>
<button onclick="setFood('豚肉')">🐷</button>
</div>

<br>

<p>📸 冷蔵庫写真</p>

<input type="file" accept="image/*" onchange="analyzeImage(event)">

<img id="preview" style="width:100%;margin-top:10px;border-radius:10px">

<button onclick="recipe()">レシピ生成</button>

<button onclick="aiRecipe()">AIレシピ生成</button>

<button onclick="openAI()">本物AIレシピ</button>

<button onclick="saveRecipe()">お気に入り</button>

<button onclick="showHistory()">履歴</button>

<div id="result" class="card"></div>

</div>

<script>

function setFood(food){

let current=document.getElementById("food").value

if(current===""){
document.getElementById("food").value=food
}else{
document.getElementById("food").value=current+","+food
}

}

function recipe(){

const food=document.getElementById("food").value

const recipes=[

`🍳 ${food}炒め

材料
${food}

作り方
1 食材カット
2 フライパン炒め
3 塩コショウ`,

`🍚 ${food}チャーハン

材料
${food}
ご飯

作り方
1 食材炒める
2 ご飯入れる
3 醤油`,

`🥗 ${food}サラダ

材料
${food}

作り方
1 カット
2 混ぜる
3 ドレッシング`

]

const r=recipes[Math.floor(Math.random()*recipes.length)]

document.getElementById("result").innerText=r

saveHistory(r)

}

function aiRecipe(){

const food=document.getElementById("food").value

const recipe = `🍳 AIレシピ

材料
${food}

作り方
1 食材を一口サイズ
2 フライパンで炒める
3 塩コショウ
4 お好みで醤油

完成`

document.getElementById("result").innerText=recipe

saveHistory(recipe)

}

function analyzeImage(event){

const file=event.target.files[0]

const reader=new FileReader()

reader.onload=function(e){

document.getElementById("preview").src=e.target.result

}

reader.readAsDataURL(file)

document.getElementById("result").innerText="AIが食材を解析中..."

setTimeout(()=>{

const foods=["卵","キャベツ","鶏肉","豚肉"]

const detected=foods[Math.floor(Math.random()*foods.length)]

document.getElementById("food").value=detected

document.getElementById("result").innerText="AI判定： "+detected

},1500)

}

function saveRecipe(){

const recipe=document.getElementById("result").innerText

localStorage.setItem("savedRecipe",recipe)

alert("保存しました")

}

function saveHistory(recipe){

let history=JSON.parse(localStorage.getItem("recipeHistory"))||[]

history.unshift(recipe)

localStorage.setItem("recipeHistory",JSON.stringify(history))

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("recipeHistory"))||[]

document.getElementById("result").innerText=history.join("\n\n----\n\n")

}

function openAI(){

const food=document.getElementById("food").value

const prompt=encodeURIComponent(food+" を使った料理レシピ")

const url="https://chat.openai.com/?q="+prompt

window.open(url)

}

</script>

</body>
</html>
